<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<title>ସମାପ୍ତି | ପାଞ୍ଚଟି ସୁରକ୍ଷା କବାଟ</title>
<meta name="description" content="Ending screen of the Five Security Doors escape-room game.">
<style>
  /* Minimal, non-destructive base reset so the game box is centered
     correctly when the page is opened directly in a browser
     (previously this markup was only ever pasted inside another
     page's container, so it had no html/body styling of its own). */
  html, body {
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="game-container">
    <style>
        /* Global Styles for the Ending Screen (Calm, Stable, Bright Cyan) */
        #game-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            min-height: 650px;
            margin: 0 auto;
            background-color: #000a14;
            background-image: 
                radial-gradient(circle at center, rgba(0, 229, 255, 0.15) 0%, #000a14 100%),
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
            border: 2px solid #00E5FF;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: glow-pulse 4s infinite alternate;
        }

        /* 3D Atom Animation */
        #atom-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 40px;
            transform-style: preserve-3d;
            animation: rotate-atom 15s linear infinite;
        }

        .nucleus {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #39FF14, #008000);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px #39FF14, 0 0 60px #39FF14;
            z-index: 10;
        }

        .orbit {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 229, 255, 0.5);
            border-radius: 50%;
            box-sizing: border-box;
            transform-style: preserve-3d;
        }

        /* Tilted Orbits to create 3D effect */
        .orbit-1 { transform: rotateY(65deg) rotateZ(0deg); animation: spin-1 4s linear infinite; }
        .orbit-2 { transform: rotateX(65deg) rotateY(45deg) rotateZ(0deg); animation: spin-2 5s linear infinite; }
        .orbit-3 { transform: rotateX(65deg) rotateY(-45deg) rotateZ(0deg); animation: spin-3 6s linear infinite; }

        /* Electrons on the orbits */
        .e-end {
            position: absolute;
            top: -6px;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #00E5FF;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF;
        }

        .orbit-2 .e-end { top: auto; bottom: -6px; }
        .orbit-3 .e-end { top: 50%; left: -6px; transform: translateY(-50%); }

        /* Professor Das Message Box */
        #message-panel {
            background: rgba(0, 20, 30, 0.8);
            border: 2px solid #00E5FF;
            border-radius: 10px;
            padding: 30px 40px;
            width: 80%;
            max-width: 800px;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.2), 0 0 20px rgba(0, 229, 255, 0.2);
            text-align: center;
            position: relative;
        }

        #title-text {
            font-size: 2.5rem;
            color: #39FF14;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #39FF14;
            letter-spacing: 2px;
            font-weight: bold;
        }

        #typewriter-text {
            font-size: 1.6rem;
            color: #FFD700;
            line-height: 1.6;
            min-height: 80px;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .prof-sign {
            font-size: 1.4rem;
            color: #00E5FF;
            text-align: right;
            margin-top: 10px;
            font-style: italic;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Buttons */
        .btn {
            background-color: rgba(0, 229, 255, 0.1);
            color: #00E5FF;
            font-size: 1.4rem;
            padding: 15px 40px;
            border: 2px solid #00E5FF;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            opacity: 0;
            pointer-events: none;
            margin-top: 20px;
        }

        .btn.visible {
            opacity: 1;
            pointer-events: auto;
            animation: pulse-btn 2s infinite;
        }

        .btn:hover {
            background-color: #00E5FF;
            color: #000;
            box-shadow: 0 0 25px #00E5FF;
        }

        /* Animations */
        @keyframes spin-1 { 100% { transform: rotateY(65deg) rotateZ(360deg); } }
        @keyframes spin-2 { 100% { transform: rotateX(65deg) rotateY(45deg) rotateZ(360deg); } }
        @keyframes spin-3 { 100% { transform: rotateX(65deg) rotateY(-45deg) rotateZ(360deg); } }
        @keyframes rotate-atom { 100% { transform: rotate(360deg); } }
        @keyframes glow-pulse { 
            0% { box-shadow: 0 0 30px rgba(0, 229, 255, 0.3); } 
            100% { box-shadow: 0 0 60px rgba(0, 229, 255, 0.6); } 
        }
        @keyframes pulse-btn {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>

    <div id="atom-container">
        <div class="nucleus"></div>
        <div class="orbit orbit-1"><div class="e-end"></div></div>
        <div class="orbit orbit-2"><div class="e-end"></div></div>
        <div class="orbit orbit-3"><div class="e-end"></div></div>
    </div>

    <div id="message-panel">
        <div id="title-text">ମିଶନ୍ ସଫଳ!</div>
        <div id="typewriter-text"></div>
        <div class="prof-sign" id="prof-sign">- ପ୍ରଫେସର ଦାସ</div>
    </div>

    <a href="index.html" class="btn" id="restart-btn">ମେନ୍ ମେନୁ କୁ ଫେରନ୍ତୁ</a>

    <script>
        const finalMessage = "ସାବାସ୍ ଗୁଇନ୍ଦାମାନେ! ତୁମେମାନେ ସବୁଠାରୁ ବଡ଼ ରହସ୍ୟ ସମାଧାନ କରିଛ। ଏହା ହିଁ ହେଉଛି ପରମାଣୁର ସମ୍ପୂର୍ଣ୍ଣ ସଂରଚନା। ମୋର ଗବେଷଣାକୁ ସୁରକ୍ଷିତ ରଖିଥିବାରୁ ଧନ୍ୟବାଦ।";
        
        window.onload = function() {
            setTimeout(startTypewriter, 1000);
        };

        function startTypewriter() {
            let i = 0;
            let textElement = document.getElementById("typewriter-text");
            textElement.innerHTML = "";
            let speed = 40; 

            function type() {
                if (i < finalMessage.length) {
                    textElement.innerHTML += finalMessage.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    // Show Professor Das signature
                    document.getElementById("prof-sign").style.opacity = "1";
                    
                    // Show Restart Button after 1 second
                    setTimeout(() => {
                        document.getElementById("restart-btn").classList.add("visible");
                    }, 1000);
                }
            }
            type();
        }
    </script>
</div>

</body>
</html>
