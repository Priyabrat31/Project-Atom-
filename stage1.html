<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<title>ସ୍ତର ୧: ଡିଜିଟାଲ୍ ପଥ | ପାଞ୍ଚଟି ସୁରକ୍ଷା କବାଟ</title>
<meta name="description" content="Stage 1 of the Five Security Doors escape-room game.">
<style>
  /* Minimal, non-destructive base reset so the game box is centered
     correctly when the page is opened directly in a browser
     (previously this markup was only ever pasted inside another
     page's container, so it had no html/body styling of its own). */
  html, body {
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="game-container">
    <style>
        /* Global Styles */
        #game-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            min-height: 650px;
            margin: 0 auto;
            background-color: #05050a;
            background-image: 
                radial-gradient(circle at center, transparent 10%, #000000 100%),
                linear-gradient(rgba(0, 229, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.08) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
            border: 2px solid #00E5FF;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #00E5FF;
        }

        #stage-title {
            font-size: 1.8rem;
            color: #00E5FF;
            font-weight: bold;
            text-shadow: 0 0 10px #00E5FF;
        }

        #progress-bar {
            display: flex;
            gap: 10px;
        }

        .progress-block {
            width: 30px;
            height: 10px;
            background: #333;
            border-radius: 5px;
        }

        .progress-block.active {
            background: #39FF14;
            box-shadow: 0 0 10px #39FF14;
        }

        #timer {
            font-size: 1.8rem;
            color: #FFD700;
            font-weight: bold;
            font-family: monospace;
        }

        /* Play Zone */
        #play-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Puzzle Area */
        #puzzle-area {
            position: relative;
            width: 200px;
            height: 200px;
            display: grid;
            grid-template-columns: 100px 100px;
            grid-template-rows: 100px 100px;
            margin-bottom: 50px;
        }

        #nucleus {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ff4c4c, #8b0000);
            border-radius: 50%;
            box-shadow: 0 0 20px #ff0000;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        #orbit-label {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #39FF14;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 15px #39FF14;
            display: none;
            z-index: 15;
            letter-spacing: 2px;
            animation: fadeIn 0.5s ease-in;
        }

        /* Electron Animations */
        #electron-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 20;
        }

        #electron {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #00E5FF;
            border-radius: 50%;
            box-shadow: 0 0 15px #00E5FF, 0 0 30px #00E5FF;
            top: -8px;
            left: 92px; /* Placed exactly on the 100px radius border */
            opacity: 0;
        }

        @keyframes flyIn {
            0% { transform: translate(600px, -400px) scale(3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }

        @keyframes revolve {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dropzone {
            width: 100px;
            height: 100px;
            box-sizing: border-box;
        }

        /* Draggable Pieces */
        #pieces-area {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed #00E5FF;
            border-radius: 10px;
            min-height: 120px;
            align-items: center;
            justify-content: center;
        }

        .piece {
            width: 100px;
            height: 100px;
            box-sizing: border-box;
            cursor: grab;
            filter: drop-shadow(0 0 8px #00E5FF);
            transition: border-color 0.3s;
        }

        .piece:active { cursor: grabbing; }

        /* Specific Arc Shapes */
        .arc-tl { border-top: 8px solid #00E5FF; border-left: 8px solid #00E5FF; border-radius: 100px 0 0 0; }
        .arc-tr { border-top: 8px solid #00E5FF; border-right: 8px solid #00E5FF; border-radius: 0 100px 0 0; }
        .arc-bl { border-bottom: 8px solid #00E5FF; border-left: 8px solid #00E5FF; border-radius: 0 0 0 100px; }
        .arc-br { border-bottom: 8px solid #00E5FF; border-right: 8px solid #00E5FF; border-radius: 0 0 100px 0; }

        /* Bottom Bar */
        #bottom-bar {
            display: flex;
            padding: 20px 30px;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid #00E5FF;
        }

        .btn {
            background-color: transparent;
            color: #00E5FF;
            font-size: 1.2rem;
            padding: 10px 25px;
            border: 2px solid #00E5FF;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #00E5FF;
            color: #0a0a0f;
            box-shadow: 0 0 15px #00E5FF;
        }

        #hint-box {
            flex: 1;
            margin: 0 20px;
            color: #FFD700;
            font-size: 1.2rem;
            min-height: 30px;
            padding: 10px;
            border-left: 3px solid transparent;
        }

        /* Success Overlay */
        #success-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 1s;
        }

        .success-title {
            font-size: 3rem;
            color: #39FF14;
            text-shadow: 0 0 20px #39FF14;
            margin-bottom: 10px;
        }

        .reveal-word {
            font-size: 5rem;
            color: #00E5FF;
            font-weight: bold;
            text-shadow: 0 0 30px #00E5FF;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        /* Video Screen */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>

    <div id="top-bar">
        <div id="stage-title">ସ୍ତର ୧: ଡିଜିଟାଲ୍ ପଥ</div>
        <div id="progress-bar">
            <div class="progress-block active"></div>
            <div class="progress-block"></div>
            <div class="progress-block"></div>
            <div class="progress-block"></div>
            <div class="progress-block"></div>
        </div>
        <div id="timer">20:00</div>
    </div>

    <div id="play-zone">
        <div id="puzzle-area">
            <div id="orbit-label">Orbit</div>
            <div id="nucleus">Nucleus</div>
            
            <div class="dropzone" id="zone-tl" data-accept="tl" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="dropzone" id="zone-tr" data-accept="tr" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="dropzone" id="zone-bl" data-accept="bl" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            <div class="dropzone" id="zone-br" data-accept="br" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
            
            <div id="electron-container">
                <div id="electron"></div>
            </div>
        </div>

        <div id="pieces-area">
            <div class="piece arc-tr" id="piece-tr" data-type="tr" draggable="true" ondragstart="drag(event)"></div>
            <div class="piece arc-bl" id="piece-bl" data-type="bl" draggable="true" ondragstart="drag(event)"></div>
            <div class="piece arc-tl" id="piece-tl" data-type="tl" draggable="true" ondragstart="drag(event)"></div>
            <div class="piece arc-br" id="piece-br" data-type="br" draggable="true" ondragstart="drag(event)"></div>
        </div>
    </div>

    <div id="bottom-bar">
        <button class="btn" onclick="showHint()" id="hint-btn">ସୁରାଗ</button>
        <div id="hint-box"></div>
    </div>

    <div id="success-overlay">
        <h2 class="success-title">ସ୍ତର ସମ୍ପୂର୍ଣ୍ଣ ହେଲା</h2>
        <div class="reveal-word">ORBIT (କକ୍ଷ)</div>
        <button class="btn" style="font-size: 1.5rem; padding: 15px 40px;" onclick="goToNextStage()">ପରବର୍ତ୍ତୀ ସ୍ତର</button>
    </div>
    <script>
        let piecesPlaced = 0;

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();
            let data = ev.dataTransfer.getData("text");
            let piece = document.getElementById(data);
            let dropzone = ev.target;

            if (dropzone.classList.contains("dropzone") && !dropzone.hasChildNodes()) {
                if (dropzone.getAttribute("data-accept") === piece.getAttribute("data-type")) {
                    // Correct Placement
                    dropzone.appendChild(piece);
                    piece.setAttribute("draggable", "false"); 
                    piece.style.cursor = "default";
                    piecesPlaced++;
                    
                    if (piecesPlaced === 4) {
                        setTimeout(triggerSuccessAnimation, 500);
                    }
                } else {
                    // Wrong Placement
                    piece.style.borderColor = "#FF0033";
                    piece.style.filter = "drop-shadow(0 0 10px #FF0033)";
                    document.getElementById("game-container").style.animation = "shake 0.3s";
                    
                    setTimeout(() => {
                        piece.style.borderColor = "#00E5FF";
                        piece.style.filter = "drop-shadow(0 0 8px #00E5FF)";
                        document.getElementById("game-container").style.animation = "";
                    }, 500);
                }
            }
        }

        // Hint Logic
        const hintText = "ଶକ୍ତିର କୌଣସି ଅନିର୍ଦ୍ଦିଷ୍ଟ ପଥ ନାହିଁ। ଏହା ଏକ ନିର୍ଦ୍ଦିଷ୍ଟ ବୃତ୍ତାକାର ରାସ୍ତା ଅନୁସରଣ କରେ।";
        let isHintTyping = false;

        function showHint() {
            if (isHintTyping) return;
            isHintTyping = true;
            let i = 0;
            let textElement = document.getElementById("hint-box");
            textElement.innerHTML = "";
            textElement.style.borderLeft = "3px solid #FFD700";
            
            function type() {
                if (i < hintText.length) {
                    textElement.innerHTML += hintText.charAt(i);
                    i++;
                    setTimeout(type, 40);
                }
            }
            type();
        }

        function triggerSuccessAnimation() {
            // 1. Glow the orbit green
            let pieces = document.querySelectorAll('.piece');
            pieces.forEach(p => {
                p.style.borderColor = "#39FF14";
                p.style.filter = "drop-shadow(0 0 15px #39FF14)";
            });

            // 2. Show the "Orbit" label
            document.getElementById('orbit-label').style.display = 'block';

            // 3. Bring in the electron
            let electronContainer = document.getElementById('electron-container');
            let electron = document.getElementById('electron');
            
            // Electron flies in from outside
            electron.style.animation = "flyIn 0.8s ease-out forwards";

            // 4. Start revolving after fly-in completes (0.8s later)
            setTimeout(() => {
                electronContainer.style.animation = "revolve 1.5s linear infinite";
            }, 800);

            // 5. Freeze/Watch for 2.5 seconds, then show Stage Complete screen
            // (0.8s for fly-in + 2.5s of revolving = 3.3s total before overlay)
            setTimeout(() => {
                document.getElementById('success-overlay').style.display = 'flex';
            }, 3300);
        }

        function goToNextStage() {
            // PASTE THE LINK TO STAGE 2 PAGE IN THE STRING BELOW
            window.location.href = "stage2.html";
        }

        let timeLeft = 20 * 60; 
        setInterval(() => {
            if(timeLeft > 0) timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }, 1000);
    </script>
</div>

</body>
</html>
