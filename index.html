<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<title>ପାଞ୍ଚଟି ସୁରକ୍ଷା କବାଟ | Home</title>
<meta name="description" content="An Odia-language escape-room mystery game: Five Security Doors.">
<style>
  /* Minimal, non-destructive base reset so the game box is centered
     correctly when the page is opened directly in a browser
     (previously this markup was only ever pasted inside another
     page's container, so it had no html/body styling of its own). */
  html, body {
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body>
<div id="game-container">
    <!-- UI Styles -->
    <style>
        #game-container {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            min-height: 650px;
            margin: 0 auto;
            
            /* --- SCI-FI LAB BACKGROUND --- */
            background-color: #05050a;
            background-image: 
                /* Center spotlight effect */
                radial-gradient(circle at center, transparent 10%, #000000 100%),
                /* High-tech Grid Lines */
                linear-gradient(rgba(0, 229, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.08) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: center;
            
            /* IF YOU HAVE A REAL IMAGE, UNCOMMENT THE LINE BELOW AND ADD YOUR URL */
            /* background-image: url('YOUR_IMAGE_LINK_HERE'), radial-gradient(circle at center, transparent 10%, #000000 100%); */
            /* background-blend-mode: overlay; */
            
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
            border: 2px solid #00E5FF;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen {
            display: none; /* Hidden by default */
            width: 90%;
            height: 90%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s ease-in-out;
        }

        .screen.active {
            display: flex; /* Show active screen */
        }

        /* Typography */
        h1.game-title {
            font-size: 4rem;
            color: #00E5FF;
            text-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF;
            margin-bottom: 20px;
            font-weight: 800;
        }

        p.story-text {
            font-size: 1.5rem;
            line-height: 1.8;
            color: #FFD700;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-left: 4px solid #FFD700;
            border-right: 4px solid #FFD700;
            text-align: left;
            max-width: 800px;
            margin-bottom: 40px;
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.1);
            border-radius: 8px;
        }

        /* Buttons */
        .btn {
            background-color: rgba(0, 229, 255, 0.1);
            color: #00E5FF;
            font-size: 1.8rem;
            padding: 15px 40px;
            border: 2px solid #00E5FF;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background-color: #00E5FF;
            color: #0a0a0f;
            box-shadow: 0 0 25px #00E5FF;
        }

        .btn-pulse {
            animation: pulse 2s infinite;
        }

        /* --- STAGE NAVIGATION BOXES --- */
        .stage-nav-container {
            display: flex;
            gap: 15px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stage-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00E5FF;
            padding: 15px 25px;
            border-radius: 8px;
            color: #00E5FF;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .stage-box:hover {
            background: #00E5FF;
            color: #000;
            box-shadow: 0 0 15px #00E5FF;
            transform: translateY(-5px);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>

    <!-- SCREEN 1: Home Menu -->
    <div id="screen-home" class="screen active">
        <h1 class="game-title">ପାଞ୍ଚଟି ସୁରକ୍ଷା କବାଟ</h1>
        <button class="btn btn-pulse" onclick="showStory()">ଅନୁସନ୍ଧାନ ଆରମ୍ଭ କରନ୍ତୁ</button>
        
        <!-- STAGE NAVIGATION (Side by Side Boxes) -->
        <div class="stage-nav-container">
            <a href="stage1.html" class="stage-box">ସ୍ତର ୧</a>
            <a href="stage2.html" class="stage-box">ସ୍ତର ୨</a>
            <a href="stage3.html" class="stage-box">ସ୍ତର ୩</a>
            <a href="stage4.html" class="stage-box">ସ୍ତର ୪</a>
            <a href="stage5.html" class="stage-box">ସ୍ତର ୫</a>
        </div>
    </div>

    <!-- SCREEN 2: Story Intro -->
    <div id="screen-story" class="screen">
        <p class="story-text" id="typewriter-text"></p>
        
        <!-- PASTE THE LINK TO STAGE 1 PAGE IN THE HREF BELOW -->
        <a href="stage1.html" class="btn" id="next-stage-btn" style="display: none;">ପ୍ରଥମ କବାଟକୁ ଯାଆନ୍ତୁ</a>
    </div>

    <!-- Logic Script -->
    <script>
        const storyContent = "ଆଲଫା ରିସର୍ଚ୍ଚ ଲାବୋରେଟୋରୀ ଏବେ ଜରୁରୀକାଳୀନ ଲକଡାଉନ୍‌ରେ ଅଛି। ଅତ୍ୟନ୍ତ ମେଧାବୀ ମୁଖ୍ୟ ବୈଜ୍ଞାନିକ, ପ୍ରଫେସର ଦାସ, ହଠାତ୍ ବିନା କୌଣସି ସୂଚନାରେ ନିଖୋଜ ହୋଇଯାଇଛନ୍ତି। ଜଣେ ଦୁର୍ବୃତ୍ତ ତାଙ୍କର ଅତି ଗୁପ୍ତ ପ୍ରୋଜେକ୍ଟ ଚୋରି କରିବାକୁ ଚେଷ୍ଟା କରି ବିଫଳ ହୋଇଥିଲା, ଏବଂ ତା' ପଛରେ ନଷ୍ଟ ହୋଇଯାଇଥିବା ତଥ୍ୟ, ଚିରା ନକ୍ସା ଏବଂ କିଛି ରହସ୍ୟମୟ ଜିନିଷ ଛାଡିଯାଇଥିଲା। ଗବେଷଣାକୁ ସୁରକ୍ଷିତ ରଖିବା ପାଇଁ, ଲାବୋରେଟୋରୀର ସିଷ୍ଟମ୍ 'ପାଞ୍ଚଟି ସୁରକ୍ଷା କବାଟ' ସକ୍ରିୟ କରି ମୁଖ୍ୟ ଭଲ୍ଟକୁ ସମ୍ପୂର୍ଣ୍ଣ ରୂପେ ବନ୍ଦ କରିଦେଇଛି। ଏହି ରହସ୍ୟମୟ ଘଟଣାର ତଦନ୍ତ କରି, ସୁରାଗ ଖୋଜି କବାଟ ଗୁଡିକୁ ଖୋଲିବାକୁ ଏବଂ ପ୍ରଫେସର କ'ଣ ଲୁଚାଇଥିଲେ ତାହା ଜାଣିବାକୁ ତୁମମାନଙ୍କୁ ଗୁଇନ୍ଦା ଦଳ ଭାବରେ ଡକାଯାଇଛି।";

        function showStory() {
            document.getElementById('screen-home').classList.remove('active');
            document.getElementById('screen-story').classList.add('active');
            typeWriterEffect();
        }

        function typeWriterEffect() {
            let i = 0;
            let textElement = document.getElementById("typewriter-text");
            textElement.innerHTML = "";
            let speed = 30; // Typing speed in milliseconds

            function type() {
                if (i < storyContent.length) {
                    textElement.innerHTML += storyContent.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    // Show button after typing finishes
                    document.getElementById("next-stage-btn").style.display = "inline-block";
                }
            }
            type();
        }
    </script>
</div>

</body>
</html>
